name: Android CI — Build Debug APK

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Debug APK
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      # 1. Check out source
      - name: Checkout repository
        uses: actions/checkout@v4

      # 2. Set up JDK 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Grant execute permission for Gradle wrapper
      - name: Grant execute permission to gradlew
        run: chmod +x gradlew

      # 4. Cache Gradle dependencies for faster builds
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties', '**/libs.versions.toml') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # 5. Build debug APK
      - name: Build debug APK
        run: ./gradlew assembleDebug --no-daemon --stacktrace

      # 6. Upload the generated APK as a build artifact
      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: JewelStockManager-debug-${{ github.sha }}
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # 7. Run unit tests (non-blocking — report failure but don't stop the artifact upload)
      - name: Run unit tests
        run: ./gradlew testDebugUnitTest --no-daemon
        continue-on-error: true

      # 8. Upload test reports
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.sha }}
          path: app/build/reports/tests/
          retention-days: 14
